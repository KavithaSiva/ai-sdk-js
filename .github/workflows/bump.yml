  #         user-name: sap-ai-sdk

  prepare-release-notes:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    # needs: [bump]
    outputs:
      pr_url: ${{ steps.open_pr.outputs.pr_url }}
    steps:
      - name: Checkout current repository
        uses: sap/ai-sdk-js/.github/actions/setup@main
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Checkout Docs Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ secrets.BOT_SDK_JS_FOR_DOCS_REPO_PR }}
          path: ${{ env.DOCS_CHECKOUT_PATH }}
          fetch-depth: 0
      - name: Update release notes file
        id: update-notes
        run: |
          NODE_OPTIONS="--loader ts-node/esm" pnpm ts-node --esm scripts/execute-add-changelog.ts
      - name: Open Release notes PR
        id: open_pr
        working-directory: ${{ env.DOCS_CHECKOUT_PATH }}
        run: |
          git config --local user.email "cloudsdk@sap.com"
          git config --local user.name "SAP Cloud SDK Bot"
          BRANCH_NAME="update-release-notes-1.12.0"
          git checkout -b "${BRANCH_NAME}"
          npm run lint:fix
          git add docs-js/release-notes.mdx


  handle-failure:
    name: Handle Failure
    runs-on: ubuntu-latest
    needs: [prepare-release-notes]
    if: ${{ failure() }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      # - name: 'Delete Release Tag'
      #   if: ${{ needs.bump.outputs.version != '' }}
      #   run: |
      #     TAG_NAME="v${{ needs.bump.outputs.version }}"
      #     echo "Attempting to delete tag ${TAG_NAME}..."
      #     git push --delete origin "${TAG_NAME}" || echo "Failed to delete tag ${TAG_NAME} (it might not exist)."
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GH_CLOUD_SDK_JS_ADMIN_WRITE_TOKEN }}
      #     continue-on-error: true
      - name: 'Close Release Notes PR and Delete Branch'
        if: ${{ needs.prepare-release-notes.outputs.pr_url != '' }}
        run: |
          PR_URL="${{ needs.prepare-release-notes.outputs.pr_url }}"
          echo "Attempting to close PR ${PR_URL} and delete its branch in repo ${{ env.DOCS_REPO }}..."
          gh pr close "${PR_URL}" --delete-branch --repo "${{ env.DOCS_REPO }}" || echo "Failed to close PR ${PR_URL} (it might already be closed/merged or branch deleted)."
        env:
          GH_TOKEN: ${{ secrets.BOT_SDK_JS_FOR_DOCS_REPO_PR }}
        continue-on-error: true
